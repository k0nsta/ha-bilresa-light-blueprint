blueprint:
  name: IKEA BILRESA scroll wheel — light control
  description: >
    Flexible, light-only control for the IKEA **BILRESA scroll wheel** (Matter).

    Flow: **pick a light → choose what the wheel does → assign each press an action.**
    Smooth, speed-proportional dimming (`step × N`), night mode with its own brightness and
    colour (temp *or* RGB), and colour-temp / RGB control.

    The wheel is a Matter generic switch with 9 button-endpoints; the under-LED button cycles
    3 product groups, so the endpoints are **3 groups × (scroll-up, scroll-down, press)**.
    Bind ONE group; make one automation per group to drive several lights.
  domain: automation
  source_url: https://github.com/k0nsta/ha-bilresa-light-blueprint/blob/main/blueprints/bilresa_light.yaml
  input:
    sec_light:
      name: 1 · Light
      icon: mdi:lightbulb
      input:
        light_target:
          name: Light(s) to control
          description: One light, a group, an area, or several.
          selector: { target: { entity: { domain: light } } }
    sec_wheel:
      name: 2 · Wheel events
      icon: mdi:knob
      description: >
        Buttons 1–9 = 3 groups × (up, down, press):
        **Group 1 → 1/2/3, Group 2 → 4/5/6, Group 3 → 7/8/9.**
        Pick the three for the group you want below.
        Not sure which is which? Spin/press the wheel, then in
        **Developer Tools → States** see which `…button_N` just changed —
        up first, then down, then a press.
      input:
        scroll_up:
          name: Scroll-up  →  Button 1 / 4 / 7  (group 1 / 2 / 3)
          selector: { entity: { filter: { domain: event } } }
        scroll_down:
          name: Scroll-down  →  Button 2 / 5 / 8
          selector: { entity: { filter: { domain: event } } }
        press:
          name: Center-press  →  Button 3 / 6 / 9
          selector: { entity: { filter: { domain: event } } }
    sec_wheel_mode:
      name: 3 · What the wheel does
      icon: mdi:rotate-360
      input:
        wheel_mode:
          name: Scroll adjusts…
          default: brightness
          selector:
            select:
              options:
                - { label: "Brightness (dim)", value: brightness }
                - { label: "Colour temperature (warm ↔ cool)", value: color_temp }
                - { label: "RGB colour (cycle the list)", value: rgb }
    sec_buttons:
      name: 4 · Button actions
      icon: mdi:gesture-tap-button
      input:
        single_action:
          name: Single-click
          default: toggle
          selector: &act { select: { options: [
            { label: "Toggle on/off", value: toggle },
            { label: "Turn on", value: "on" },
            { label: "Turn off", value: "off" },
            { label: "On with preset (brightness + colour)", value: preset },
            { label: "Toggle preset (preset on / off)", value: toggle_preset },
            { label: "Activate a scene", value: scene },
            { label: "Next colour", value: color_next },
            { label: "Previous colour", value: color_prev },
            { label: "Do nothing", value: none } ] } }
        single_scene:
          name: Single-click scene (when action = Activate a scene)
          default: []
          selector: { entity: { filter: { domain: scene } } }
        double_action:
          name: Double-click
          default: color_next
          selector: *act
        double_scene:
          name: Double-click scene (when action = Activate a scene)
          default: []
          selector: { entity: { filter: { domain: scene } } }
        triple_action:
          name: Triple-click
          default: none
          selector: *act
        triple_scene:
          name: Triple-click scene (when action = Activate a scene)
          default: []
          selector: { entity: { filter: { domain: scene } } }
        hold_action:
          name: Long-press (hold)
          default: "off"
          selector: *act
        hold_scene:
          name: Long-press scene (when action = Activate a scene)
          default: []
          selector: { entity: { filter: { domain: scene } } }
    sec_preset:
      name: 5 · Preset (for "On with preset")
      icon: mdi:star
      collapsed: true
      input:
        preset_brightness:
          name: Preset brightness (%)
          default: 80
          selector: { number: { min: 1, max: 100, step: 1, unit_of_measurement: "%", mode: slider } }
        preset_color_kind:
          name: Preset colour
          default: color_temp
          selector: &colourkind { select: { options: [
            { label: "Keep current", value: none },
            { label: "Colour temperature", value: color_temp },
            { label: "RGB", value: rgb } ] } }
        preset_temp:
          name: Preset colour temp (K)
          default: 3000
          selector: { number: { min: 1500, max: 6500, step: 50, unit_of_measurement: K, mode: slider } }
        preset_rgb:
          name: Preset RGB
          default: [255, 200, 120]
          selector: { color_rgb: {} }
    sec_colour:
      name: 6 · Colour cycle ranges
      icon: mdi:palette
      collapsed: true
      input:
        ct_min:
          name: Warmest temp (K)
          default: 2200
          selector: { number: { min: 1500, max: 4000, step: 50, unit_of_measurement: K, mode: slider } }
        ct_max:
          name: Coolest temp (K)
          default: 5000
          selector: { number: { min: 3000, max: 6500, step: 50, unit_of_measurement: K, mode: slider } }
        ct_step:
          name: Temp step (K)
          default: 400
          selector: { number: { min: 100, max: 1500, step: 50, unit_of_measurement: K, mode: slider } }
        rgb_colours:
          name: RGB cycle list
          default: [[255, 170, 90], [255, 255, 255], [255, 80, 40], [120, 160, 255], [180, 90, 255]]
          selector: { object: {} }
    sec_dimming:
      name: 7 · Dimming feel
      icon: mdi:tune
      collapsed: true
      input:
        brightness_helper:
          name: Brightness helper (input_number) — smooth absolute dimming
          description: >
            Strongly recommended for Matter/Thread bulbs. Create an `input_number`
            (min 1, max 100, step 1) and select it here. The wheel then dims by setting an
            **absolute** brightness through this helper, so fast spins can't overshoot or
            lag-compound the way relative steps do. Leave empty to fall back to relative
            stepping. Use one helper per light/group.
          default: []
          selector: { entity: { filter: { domain: input_number } } }
        step_pct:
          name: Brightness per notch (%)
          default: 8
          selector: { number: { min: 1, max: 25, step: 1, unit_of_measurement: "%", mode: slider } }
        max_multiplier:
          name: Max speed multiplier
          default: 6
          selector: { number: { min: 1, max: 8, step: 1, mode: slider } }
        use_transition:
          name: Use transitions
          description: OFF is safest for IKEA/Matter bulbs (transitions can freeze them on fast scrolls).
          default: false
          selector: { boolean: {} }
        transition:
          name: Transition time (s)
          default: 0.4
          selector: { number: { min: 0, max: 3, step: 0.1, unit_of_measurement: s, mode: slider } }
    sec_night:
      name: 8 · Night mode
      icon: mdi:weather-night
      collapsed: true
      input:
        night_enable:
          name: Enable night mode
          default: false
          selector: { boolean: {} }
        night_start:
          name: Night start
          default: "22:00:00"
          selector: { time: {} }
        night_end:
          name: Night end
          default: "07:00:00"
          selector: { time: {} }
        night_override:
          name: Night override (optional)
          default: []
          selector: { entity: { multiple: false, filter: [{ domain: input_boolean }, { domain: binary_sensor }, { domain: schedule }] } }
        night_brightness:
          name: Night turn-on brightness (%)
          default: 15
          selector: { number: { min: 1, max: 100, step: 1, unit_of_measurement: "%", mode: slider } }
        night_color_kind:
          name: Night colour
          default: color_temp
          selector: *colourkind
        night_temp:
          name: Night colour temp (K)
          default: 2200
          selector: { number: { min: 1500, max: 4000, step: 50, unit_of_measurement: K, mode: slider } }
        night_rgb:
          name: Night RGB
          default: [255, 120, 40]
          selector: { color_rgb: {} }

mode: queued
max: 4
max_exceeded: silent

triggers:
  - trigger: state
    entity_id: !input scroll_up
    id: up
  - trigger: state
    entity_id: !input scroll_down
    id: down
  - trigger: state
    entity_id: !input press
    id: press

variables:
  et: "{{ trigger.to_state.attributes.event_type | default('') }}"
  notches: "{{ (et.split('_')[-1] | int(1)) if 'multi_press' in et else 1 }}"
  step: !input step_pct
  maxm: !input max_multiplier
  delta: "{{ ([notches | int(1), maxm | int(6)] | min) * (step | int(8)) }}"
  use_trans: !input use_transition
  trans_val: !input transition
  trans_s: "{{ trans_val if use_trans else 0 }}"
  brightness_helper: !input brightness_helper
  use_helper: >-
    {{ brightness_helper not in ['', none]
       and (brightness_helper | string | length) > 0
       and has_value(brightness_helper) }}
  wheel_mode: !input wheel_mode
  single_action: !input single_action
  double_action: !input double_action
  hold_action: !input hold_action
  triple_action: !input triple_action
  single_scene: !input single_scene
  double_scene: !input double_scene
  triple_scene: !input triple_scene
  hold_scene: !input hold_scene
  scene_for: >-
    {% if et == 'multi_press_1' %}{{ single_scene }}
    {% elif et == 'multi_press_2' %}{{ double_scene }}
    {% elif et == 'multi_press_3' %}{{ triple_scene }}
    {% elif et == 'long_press' %}{{ hold_scene }}
    {% else %}{{ '' }}{% endif %}
  preset_brightness: !input preset_brightness
  preset_color_kind: !input preset_color_kind
  preset_temp: !input preset_temp
  preset_rgb: !input preset_rgb
  ct_min: !input ct_min
  ct_max: !input ct_max
  ct_step: !input ct_step
  rgb_colours: !input rgb_colours
  night_enable: !input night_enable
  night_start: !input night_start
  night_end: !input night_end
  night_override: !input night_override
  night_brightness: !input night_brightness
  night_color_kind: !input night_color_kind
  night_temp: !input night_temp
  night_rgb: !input night_rgb
  light_target: !input light_target
  first_light: >-
    {% set t = light_target %}
    {% set e = t.get('entity_id', []) if t is mapping else [] %}
    {% if e is string %}{% set e = [e] %}{% endif %}
    {% if not e and t is mapping and t.get('area_id') %}
      {% set a = t['area_id'] %}{% set a = a[0] if (a is iterable and a is not string) else a %}
      {% set e = area_entities(a) | select('match', '^light\\.') | list %}
    {% endif %}
    {{ e[0] if e else '' }}
  night_active: >-
    {% if not night_enable %}{{ false }}
    {% else %}
      {% set st = strptime(night_start, '%H:%M:%S').time() %}
      {% set en = strptime(night_end, '%H:%M:%S').time() %}
      {% set n = now().time() %}
      {% set win = (n >= st or n < en) if st > en else (st <= n < en) %}
      {% set ov = (night_override | length > 0) and is_state(night_override, 'on') %}
      {{ win or ov }}
    {% endif %}
  # data dict used when an action turns the light ON (night settings win during night)
  on_data: >-
    {% set d = {} %}
    {% if night_active %}
      {% set d = dict(d, **{'brightness_pct': night_brightness}) %}
      {% if night_color_kind == 'color_temp' %}{% set d = dict(d, **{'color_temp_kelvin': night_temp}) %}
      {% elif night_color_kind == 'rgb' %}{% set d = dict(d, **{'rgb_color': night_rgb}) %}{% endif %}
    {% endif %}
    {% if trans_s | float(0) > 0 %}{% set d = dict(d, **{'transition': trans_s}) %}{% endif %}
    {{ d }}
  preset_data: >-
    {% set d = {'brightness_pct': preset_brightness} %}
    {% if night_active %}{% set d = dict(d, **{'brightness_pct': night_brightness}) %}{% endif %}
    {% set kind = night_color_kind if night_active else preset_color_kind %}
    {% set t = night_temp if night_active else preset_temp %}
    {% set rgb = night_rgb if night_active else preset_rgb %}
    {% if kind == 'color_temp' %}{% set d = dict(d, **{'color_temp_kelvin': t}) %}
    {% elif kind == 'rgb' %}{% set d = dict(d, **{'rgb_color': rgb}) %}{% endif %}
    {% if trans_s | float(0) > 0 %}{% set d = dict(d, **{'transition': trans_s}) %}{% endif %}
    {{ d }}

conditions:
  - "{{ trigger.to_state is not none and trigger.to_state.state not in ['unavailable','unknown'] }}"
  - "{{ et != '' }}"

action:
  - variables:
      # which configured action applies to this press
      btn: >-
        {% if trigger.id != 'press' %}{{ '' }}
        {% elif et == 'multi_press_1' %}{{ single_action }}
        {% elif et == 'multi_press_2' %}{{ double_action }}
        {% elif et == 'multi_press_3' %}{{ triple_action }}
        {% elif et in ['long_press'] %}{{ hold_action }}
        {% else %}{{ '' }}{% endif %}
  - choose:
      # ================= WHEEL =================
      - conditions: "{{ trigger.id in ['up','down'] }}"
        sequence:
          - choose:
              # --- brightness ---
              - conditions: "{{ wheel_mode == 'brightness' }}"
                sequence:
                  - choose:
                      # absolute via helper: instant, authoritative, never lag-compounds
                      - conditions: "{{ use_helper }}"
                        sequence:
                          - variables:
                              cur_b: >-
                                {% set h = states(brightness_helper) | float(-1) %}
                                {% if h < 0 %}{{ (state_attr(first_light, 'brightness') | int(128)) / 2.55 }}
                                {% else %}{{ h }}{% endif %}
                              new_b: >-
                                {% set nv = cur_b + (delta if trigger.id == 'up' else -delta) %}
                                {{ [[nv | round(0), 1] | max, 100] | min | int }}
                          - action: input_number.set_value
                            target: { entity_id: "{{ brightness_helper }}" }
                            data: { value: "{{ new_b }}" }
                          - action: light.turn_on
                            target: !input light_target
                            data:
                              brightness_pct: "{{ new_b }}"
                              transition: "{{ trans_s }}"
                    # relative fallback when no helper is configured
                    default:
                      - action: light.turn_on
                        target: !input light_target
                        data:
                          brightness_step_pct: "{{ delta if trigger.id == 'up' else -delta }}"
                          transition: "{{ trans_s }}"
              # --- colour temperature ---
              - conditions: "{{ wheel_mode == 'color_temp' }}"
                sequence:
                  - action: light.turn_on
                    target: !input light_target
                    data:
                      color_temp_kelvin: >-
                        {% set cur = state_attr(first_light, 'color_temp_kelvin') | int(((ct_min|int)+(ct_max|int))//2) %}
                        {% set d = (ct_step|int) * ([notches|int(1), maxm|int(6)]|min) %}
                        {% set nv = cur + (d if trigger.id == 'up' else -d) %}
                        {{ [[nv, ct_min|int]|max, ct_max|int]|min }}
                      transition: "{{ trans_s }}"
              # --- rgb cycle ---
              - conditions: "{{ wheel_mode == 'rgb' }}"
                sequence:
                  - action: light.turn_on
                    target: !input light_target
                    data:
                      rgb_color: >-
                        {% set lst = rgb_colours %}
                        {% set cur = state_attr(first_light, 'rgb_color') %}
                        {% set ns = namespace(i=0) %}
                        {% for c in lst %}{% if (c|list) == (cur|list) %}{% set ns.i = loop.index0 %}{% endif %}{% endfor %}
                        {% set j = (ns.i + 1) if trigger.id == 'up' else (ns.i - 1) %}
                        {{ lst[j % (lst|length)] }}
                      transition: "{{ trans_s }}"
      # ================= PRESS (configured action) =================
      - conditions: "{{ trigger.id == 'press' and btn == 'toggle' }}"
        sequence:
          - if: "{{ first_light != '' and is_state(first_light, 'on') }}"
            then:
              - action: light.turn_off
                target: !input light_target
                data: { transition: "{{ trans_s }}" }
            else:
              - action: light.turn_on
                target: !input light_target
                data: "{{ on_data }}"
      - conditions: "{{ trigger.id == 'press' and btn == 'on' }}"
        sequence:
          - action: light.turn_on
            target: !input light_target
            data: "{{ on_data }}"
      - conditions: "{{ trigger.id == 'press' and btn == 'off' }}"
        sequence:
          - action: light.turn_off
            target: !input light_target
            data: { transition: "{{ trans_s }}" }
      - conditions: "{{ trigger.id == 'press' and btn == 'preset' }}"
        sequence:
          - action: light.turn_on
            target: !input light_target
            data: "{{ preset_data }}"
      - conditions: "{{ trigger.id == 'press' and btn == 'toggle_preset' }}"
        sequence:
          - if: "{{ first_light != '' and is_state(first_light, 'on') }}"
            then:
              - action: light.turn_off
                target: !input light_target
                data: { transition: "{{ trans_s }}" }
            else:
              - action: light.turn_on
                target: !input light_target
                data: "{{ preset_data }}"
      - conditions: >-
          {{ trigger.id == 'press' and btn == 'scene'
             and scene_for not in ['', none] and (scene_for | string | length) > 0 }}
        sequence:
          - action: scene.turn_on
            target: { entity_id: "{{ scene_for }}" }
            data: { transition: "{{ trans_s }}" }
      - conditions: "{{ trigger.id == 'press' and btn == 'color_next' }}"
        sequence:
          - action: light.turn_on
            target: !input light_target
            data:
              color_temp_kelvin: >-
                {% set cur = state_attr(first_light, 'color_temp_kelvin') | int(ct_min) %}
                {{ [ct_min|int, cur - (ct_step|int)]|max }}
              transition: "{{ trans_s }}"
      - conditions: "{{ trigger.id == 'press' and btn == 'color_prev' }}"
        sequence:
          - action: light.turn_on
            target: !input light_target
            data:
              color_temp_kelvin: >-
                {% set cur = state_attr(first_light, 'color_temp_kelvin') | int(ct_max) %}
                {{ [ct_max|int, cur + (ct_step|int)]|min }}
              transition: "{{ trans_s }}"
